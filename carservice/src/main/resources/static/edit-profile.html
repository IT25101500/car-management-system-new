<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile — Car Service</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        :root {
          --bg:#f5f6fa; --card:#ffffff; --primary:#2563eb;
          --primary-dark:#1d4ed8; --text:#111827;
          --muted:#6b7280; --border:#e5e7eb; --danger:#ef4444;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'DM Sans',sans-serif; background:var(--bg);
               display:flex; justify-content:center; align-items:center; min-height:100vh; }
        .card { background:var(--card); border-radius:20px; padding:40px;
                width:440px; box-shadow:0 8px 30px rgba(0,0,0,0.08); }
        .back-btn { display:inline-flex; align-items:center; gap:6px; font-size:13px;
                    color:var(--muted); cursor:pointer; margin-bottom:24px;
                    background:none; border:none; }
        .back-btn:hover { color:var(--text); }
        .avatar { width:72px; height:72px; border-radius:50%; background:var(--primary);
                  color:#fff; font-size:28px; font-weight:600; display:flex;
                  align-items:center; justify-content:center; margin:0 auto 20px; }
        h2 { font-family:'DM Serif Display',serif; font-size:22px; text-align:center;
             color:var(--text); margin-bottom:6px; }
        .subtitle { font-size:13px; color:var(--muted); text-align:center; margin-bottom:28px; }
        .form-group { margin-bottom:18px; }
        label { font-size:13px; font-weight:500; color:var(--text); display:block; margin-bottom:6px; }
        input { width:100%; padding:11px 14px; border:1.5px solid var(--border);
                border-radius:8px; font-size:14px; font-family:'DM Sans',sans-serif;
                color:var(--text); transition:border .15s; outline:none; }
        input:focus { border-color:var(--primary); }
        input:disabled { background:#f9fafb; color:var(--muted); cursor:not-allowed; }
        .save-btn { width:100%; padding:12px; background:var(--primary); color:#fff;
                    border:none; border-radius:8px; font-size:15px; font-weight:500;
                    cursor:pointer; transition:background .15s; margin-top:8px;
                    font-family:'DM Sans',sans-serif; }
        .save-btn:hover { background:var(--primary-dark); }
        .msg { text-align:center; margin-top:14px; font-size:13px;
               padding:10px; border-radius:8px; display:none; }
        .msg.success { background:#f0fdf4; color:#065f46; display:block; }
        .msg.error   { background:#fff5f5; color:#991b1b; display:block; }
        .note { font-size:11px; color:var(--muted); margin-top:4px; }
    </style>
</head>
<body>
<div class="card">
    <button class="back-btn" onclick="goBack()">← Back to Dashboard</button>
    <div class="avatar" id="avatarInitial">U</div>
    <h2>Edit Profile</h2>
    <p class="subtitle">Update your personal details below</p>

    <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Your full name">
    </div>
    <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="Your email">
    </div>
    <div class="form-group">
        <label>Phone Number</label>
        <input type="text" id="phone" placeholder="Your phone number">
    </div>
    <div class="form-group">
        <label>New Password</label>
        <input type="password" id="password" placeholder="Leave blank to keep current password">
        <p class="note">Only fill this if you want to change your password</p>
    </div>

    <button class="save-btn" onclick="saveProfile()">Save Changes</button>
    <div class="msg" id="msg"></div>
</div>

<script>
    const user = JSON.parse(localStorage.getItem('loggedUser'));
    if (!user) window.location.href = 'index.html';

    // Pre-fill fields
    document.getElementById('avatarInitial').textContent = user.name.charAt(0).toUpperCase();
    document.getElementById('name').value  = user.name;
    document.getElementById('email').value = user.email;
    document.getElementById('phone').value = user.phone || '';

    async function saveProfile() {
      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const phone    = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;

      if (!name || !email) {
        showMsg('Name and email are required!', 'error');
        return;
      }

      // Use new password if filled, else keep old one
      const updated = {
        name:     name,
        email:    email,
        phone:    phone,
        password: password ? password : user.password
      };

      const res = await fetch(`http://localhost:8080/api/users/${user.id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(updated)
      });

      if (res.ok) {
        const updatedUser = await res.json();
        localStorage.setItem('loggedUser', JSON.stringify(updatedUser));
        showMsg('Profile updated successfully!', 'success');
        setTimeout(() => window.location.href = 'user-dashboard.html', 1500);
      } else {
        showMsg('Update failed. Please try again.', 'error');
      }
    }

    function showMsg(text, type) {
      const msg = document.getElementById('msg');
      msg.textContent  = text;
      msg.className    = 'msg ' + type;
    }

    function goBack() {
      window.location.href = 'user-dashboard.html';
    }
</script>
</body>
</html>
