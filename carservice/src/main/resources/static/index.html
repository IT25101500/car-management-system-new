<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Service — Login</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial,sans-serif; background:#f0f2f5;
               display:flex; justify-content:center; align-items:center; height:100vh; }
        .box { background:#fff; padding:40px; border-radius:12px;
               box-shadow:0 2px 16px rgba(0,0,0,0.1); width:360px; }
        h2 { text-align:center; margin-bottom:24px; color:#333; }
        label { font-size:13px; color:#555; }
        input { width:100%; padding:10px; margin:6px 0 16px;
                border:1px solid #ddd; border-radius:6px; font-size:14px; }
        button { width:100%; padding:12px; background:#378ADD;
                 color:#fff; border:none; border-radius:6px; font-size:15px; cursor:pointer; }
        button:hover { background:#185FA5; }
        .link { text-align:center; margin-top:16px; font-size:13px; }
        .link a { color:#378ADD; text-decoration:none; }
        .msg { text-align:center; margin-top:12px; font-size:13px; color:red; }
    </style>
</head>
<body>
<div class="box">
    <h2>Car Service Login</h2>
    <label>Email</label>
    <input type="email" id="email" placeholder="Enter your email">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter your password">
    <button onclick="login()">Login</button>
    <div class="link">No account? <a href="register.html">Register here</a></div>
    <div class="msg" id="msg"></div>
</div>


<script>
    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!email || !password) {
        document.getElementById('msg').textContent = 'Please fill in all fields!';
        return;
      }

      const res = await fetch('http://localhost:8080/api/users/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      if (res.ok) {
        const user = await res.json();
        // Save user info to use on other pages
        localStorage.setItem('loggedUser', JSON.stringify(user));

        // Redirect based on role
        if (user.role === 'ADMIN') {
          window.location.href = 'admin-dashboard.html';
        } else {
          window.location.href = 'user-dashboard.html';
        }
      } else {
        document.getElementById('msg').textContent = 'Invalid email or password!';
      }
    }
</script>
</body>
</html>
