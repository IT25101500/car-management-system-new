<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Service — Login</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f4f7f6; /* Soft light grey background */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .main-container {
            display: flex;
            width: 1200px;
            height: 650px;
            background: #fff;
            border-radius: 30px; /* Nice curved edges */
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }

        /* Left Side: Image */
        .left-side {
            flex: 1.2;
            background: url('/images/login_page_pic.avif') no-repeat center center;
            background-size: cover;
            position: relative;
        }

        .left-side::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.5));
        }

        .overlay-text {
            position: absolute;
            bottom: 50px;
            left: 50px;
            color: #fff;
            z-index: 1;
        }

        .overlay-text h1 { font-size: 42px; margin-bottom: 10px; font-weight: 700; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        .overlay-text p { font-size: 18px; opacity: 0.9; max-width: 400px; }

        /* Right Side: Form */
        .right-side {
            flex: 0.8;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: #B3DFE3; /* Distinct Grey */
        }

        h2 { color: #1a1a1a; margin-bottom: 8px; font-size: 32px; font-weight: 700; }
        p.subtitle { color: #555; margin-bottom: 40px; font-size: 15px; }

        .form-group { margin-bottom: 25px; }
        label { display: block; font-size: 13px; color: #333; margin-bottom: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        
        input { 
            width: 100%; 
            padding: 15px; 
            border: 1.5px solid #ddd; 
            border-radius: 12px; 
            font-size: 16px;
            background: #ffffff; /* White inputs for contrast */
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #e74c3c;
            background: #fff;
            box-shadow: 0 4px 12px rgba(231, 76, 60, 0.1);
        }

        button { 
            width: 100%; 
            padding: 16px; 
            background: #e74c3c; 
            color: #fff; 
            border: none; 
            border-radius: 12px; 
            font-size: 17px; 
            font-weight: 600;
            cursor: pointer; 
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 8px 20px rgba(231, 76, 60, 0.3);
        }

        button:hover { 
            background: #c0392b;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(231, 76, 60, 0.4);
        }

        .link { text-align: center; margin-top: 30px; font-size: 14px; color: #777; }
        .link a { color: #e74c3c; text-decoration: none; font-weight: 700; }
        .link a:hover { text-decoration: underline; }

        .msg { text-align: center; margin-top: 20px; font-size: 14px; color: #e74c3c; font-weight: 500; min-height: 20px; }

        @media (max-width: 1200px) {
            .main-container { width: 95%; height: 90vh; }
        }

        @media (max-width: 850px) {
            .left-side { display: none; }
            .right-side { flex: 1; padding: 40px; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="left-side">
        <div class="overlay-text">
            <h1>Premium Car Care</h1>
            <p>Your vehicle's health is our top priority.</p>
        </div>
    </div>
    
    <div class="right-side">
        <h2>Welcome Back</h2>
        <p class="subtitle">Enter your details to manage your car service.</p>
        
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="e.g. john@example.com">
        </div>
        
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        
        <button onclick="login()">Sign In</button>
        
        <div class="msg" id="msg"></div>
        
        <div class="link">
            Need an account? <a href="register.html">Create one here</a>
        </div>
    </div>
</div>

<script>
    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const msg = document.getElementById('msg');

      if (!email || !password) {
        msg.textContent = 'Please fill in all fields!';
        return;
      }

      try {
        const res = await fetch('/api/users/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        if (res.ok) {
          const user = await res.json();
          localStorage.setItem('loggedUser', JSON.stringify(user));

          if (user.role === 'ADMIN') {
            window.location.href = 'admin-dashboard.html';
          } else {
            window.location.href = 'user-dashboard.html';
          }
        } else {
          msg.textContent = 'Invalid email or password!';
        }
      } catch (error) {
        msg.textContent = 'Connection error. Is the server running?';
      }
    }
</script>
</body>
</html>
