<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Service — Register</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial,sans-serif; background:#f0f2f5;
               display:flex; justify-content:center; align-items:center; min-height:100vh; }
        .box { background:#fff; padding:40px; border-radius:12px;
               box-shadow:0 2px 16px rgba(0,0,0,0.1); width:380px; }
        h2 { text-align:center; margin-bottom:24px; color:#333; }
        input { width:100%; padding:10px; margin:6px 0 14px;
                border:1px solid #ddd; border-radius:6px; font-size:14px; }
        button { width:100%; padding:12px; background:#1D9E75;
                 color:#fff; border:none; border-radius:6px; font-size:15px; cursor:pointer; }
        button:hover { background:#085041; }
        .link { text-align:center; margin-top:16px; font-size:13px; }
        .link a { color:#1D9E75; text-decoration:none; }
        .msg { text-align:center; margin-top:12px; font-size:13px; }
    </style>
</head>
<body>
<div class="box">
    <h2>Create Account</h2>
    <label>Full Name</label>
    <input type="text" id="name" placeholder="Your full name">
    <label>Email</label>
    <input type="email" id="email" placeholder="Your email">
    <label>Password</label>
    <input type="password" id="password" placeholder="Choose a password">
    <label>Phone</label>
    <input type="text" id="phone" placeholder="Phone number">
    <button onclick="register()">Register</button>
    <div class="link">Already have an account? <a href="index.html">Login</a></div>
    <div class="msg" id="msg"></div>
</div>
<script>
    async function register() {
      const user = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        phone: document.getElementById('phone').value
      };
      const res = await fetch('http://localhost:8080/api/users/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(user)
      });
      if (res.ok) {
        document.getElementById('msg').style.color = 'green';
        document.getElementById('msg').textContent = 'Registered! Redirecting...';
        setTimeout(() => window.location.href = 'index.html', 1500);
      } else {
        document.getElementById('msg').style.color = 'red';
        document.getElementById('msg').textContent = 'Registration failed!';
      }
    }
</script>
</body>
</html>
