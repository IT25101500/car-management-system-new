<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial,sans-serif; background:#f0f2f5; padding:30px; }
        .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
        .header h2 { color:#333; }
        .logout { background:#E24B4A; color:#fff; border:none;
                  padding:8px 18px; border-radius:6px; cursor:pointer; font-size:14px; }
        .logout:hover { background:#A32D2D; }
        .stats { display:flex; gap:16px; margin-bottom:24px; }
        .stat-card { background:#fff; border-radius:10px; padding:20px 28px;
                     box-shadow:0 2px 8px rgba(0,0,0,0.08); flex:1; text-align:center; }
        .stat-card h3 { font-size:28px; color:#378ADD; }
        .stat-card p { font-size:13px; color:#888; margin-top:4px; }
        table { width:100%; background:#fff; border-radius:10px;
                box-shadow:0 2px 8px rgba(0,0,0,0.08); border-collapse:collapse; }
        th { background:#378ADD; color:#fff; padding:12px 16px; text-align:left; }
        td { padding:12px 16px; border-bottom:1px solid #eee; font-size:14px; }
        tr:hover { background:#f9f9f9; }
        .del-btn { background:#E24B4A; color:#fff; border:none;
                   padding:6px 12px; border-radius:4px; cursor:pointer; font-size:13px; margin-right:6px; }
        .del-btn:hover { background:#A32D2D; }
        .promote-btn { background:#534AB7; color:#fff; border:none;
                       padding:6px 12px; border-radius:4px; cursor:pointer; font-size:13px; margin-right:6px; }
        .promote-btn:hover { background:#3C3489; }
        .demote-btn { background:#BA7517; color:#fff; border:none;
                      padding:6px 12px; border-radius:4px; cursor:pointer; font-size:13px; }
        .demote-btn:hover { background:#633806; }
        .badge { padding:3px 10px; border-radius:12px; font-size:12px; font-weight:500; }
        .ADMIN { background:#EEEDFE; color:#3C3489; }
        .USER  { background:#E1F5EE; color:#085041; }
    </style>
</head>
<body>
<div class="header">
    <h2>Admin Dashboard</h2>
    <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="stats">
    <div class="stat-card">
        <h3 id="totalUsers">0</h3>
        <p>Total Users</p>
    </div>
    <div class="stat-card">
        <h3 id="totalAdmins">0</h3>
        <p>Total Admins</p>
    </div>
    <div class="stat-card">
        <h3 id="totalRegular">0</h3>
        <p>Regular Users</p>
    </div>
</div>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Role</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody id="userTable"></tbody>
</table>

<script>
    const admin = JSON.parse(localStorage.getItem('loggedUser'));
    if (!admin || admin.role !== 'ADMIN') {
      window.location.href = 'index.html';
    }

    async function loadUsers() {
      const res = await fetch('http://localhost:8080/api/users');
      const users = await res.json();

      document.getElementById('totalUsers').textContent   = users.length;
      document.getElementById('totalAdmins').textContent  = users.filter(u => u.role === 'ADMIN').length;
      document.getElementById('totalRegular').textContent = users.filter(u => u.role === 'USER').length;

      const tbody = document.getElementById('userTable');
      tbody.innerHTML = users.map(u => `
        <tr>
          <td>${u.id}</td>
          <td>${u.name}</td>
          <td>${u.email}</td>
          <td>${u.phone || '-'}</td>
          <td><span class="badge ${u.role}">${u.role}</span></td>
          <td>
            ${u.role === 'USER'
              ? `<button class="promote-btn" onclick="changeRole(${u.id}, 'ADMIN')">Make Admin</button>`
              : `<button class="demote-btn"  onclick="changeRole(${u.id}, 'USER')">Make User</button>`
            }
            <button class="del-btn" onclick="deleteUser(${u.id})">Delete</button>
          </td>
        </tr>
      `).join('');
    }

    async function changeRole(id, newRole) {
      const action = newRole === 'ADMIN' ? 'promote to Admin' : 'demote to User';
      if (!confirm(`Are you sure you want to ${action}?`)) return;

      const res = await fetch(`http://localhost:8080/api/users/${id}/role?role=${newRole}`, {
        method: 'PUT'
      });

      if (res.ok) {
        loadUsers();
      } else {
        alert('Failed to change role!');
      }
    }

    async function deleteUser(id) {
      if (!confirm('Are you sure you want to delete this user?')) return;
      await fetch(`http://localhost:8080/api/users/${id}`, { method: 'DELETE' });
      loadUsers();
    }

    function logout() {
      localStorage.removeItem('loggedUser');
      window.location.href = 'index.html';
    }

    loadUsers();
</script>
</body>
</html>
